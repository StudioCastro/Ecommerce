services:
  postgres:
    image: postgres:16-alpine
    container_name: novaloja-responsivo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: novaloja
      POSTGRES_PASSWORD: novaloja_dev_password
      POSTGRES_DB: novaloja
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novaloja"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: novaloja-responsivo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: novaloja-responsivo-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://novaloja:novaloja_dev_password@postgres:5432/novaloja?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma

volumes:
  postgres_data:
  redis_data:
