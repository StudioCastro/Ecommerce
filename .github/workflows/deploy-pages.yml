name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          # Defina esta variável em Settings > Secrets and variables > Actions > Variables
          # quando o backend estiver hospedado publicamente. Sem ela, o build usa o fallback
          # de src/services/api.js (localhost) — o site carrega, mas chamadas à API falham
          # para quem acessa fora da sua máquina.
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      # SPA com BrowserRouter: GitHub Pages só serve arquivos que existem, então recarregar
      # ou linkar direto para uma rota como /shop resultaria em 404. Servir o mesmo index.html
      # como 404.html deixa o react-router assumir o roteamento no cliente.
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
